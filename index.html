<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salem Witches Online - Shelf Cabinet</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="shelf-container">
        <!-- Shelf background -->
        <div class="shelf-background"></div>
        
        <!-- Clickable objects on the shelf -->
        <div class="shelf-objects">
            <button class="shelf-item camera" data-section="visual-production" title="Visual Production">
                <img src="assets/camera.png" alt="Camera - Visual Production">
            </button>
            
            <button class="shelf-item performance" data-section="performance" title="Performance">
                <img src="assets/mask.png" alt="Mask - Performance">
            </button>
            
            <button class="shelf-item craft" data-section="craft" title="Craft Objects">
                <img src="assets/diffuser.png" alt="Diffuser - Craft Objects">
            </button>
            
            <button class="shelf-item video" data-section="video" title="Video">
                <img src="assets/tablet.png" alt="Tablet - Video">
            </button>
            
            <button class="shelf-item contact" data-section="contact" title="Contact">
                <img src="assets/letter.png" alt="Letter - Contact">
            </button>
        </div>
    </div>

    <!-- Modal for "Coming Soon" -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modal-title">Coming Soon</h2>
            <p id="modal-text">This section is coming soon. Stay tuned!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
